name: build

on:
  push:
    branches:
      - main
    tags:
      - "*-[0-9]+.*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Cache local Maven repository
        uses: actions/cache@v4
        env:
          cache-name: cache-m2
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-build-${{ env.cache-name }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'zulu'
      - name: Clear corrupted xml-apis-ext from cache
        run: rm -rf ~/.m2/repository/xml-apis/xml-apis-ext
      - name: Pre-install xml-apis-ext
        run: |
          curl -L https://repo1.maven.org/maven2/xml-apis/xml-apis-ext/1.3.04/xml-apis-ext-1.3.04.jar \
            -o /tmp/xml-apis-ext.jar
          ls -lh /tmp/xml-apis-ext.jar  # sanity check: should be ~85KB
          mvn install:install-file \
            -Dfile=/tmp/xml-apis-ext.jar \
            -DgroupId=xml-apis \
            -DartifactId=xml-apis-ext \
            -Dversion=1.3.04 \
            -Dpackaging=jar
      - name: Set up CI environment
        run: .github/setup.sh
      - name: Execute the build
        run: .github/build.sh
        env:
          GPG_KEY_NAME: ${{ secrets.GPG_KEY_NAME }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          MAVEN_USER: ${{ secrets.MAVEN_USER }}
          MAVEN_PASS: ${{ secrets.MAVEN_PASS }}
          OSSRH_PASS: ${{ secrets.OSSRH_PASS }}
          SIGNING_ASC: ${{ secrets.SIGNING_ASC }}